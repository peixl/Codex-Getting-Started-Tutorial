version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      next-stack:
        patterns:
          - next
          - react
          - react-dom
      tooling:
        patterns:
          - eslint*
          - typescript
          - "@types/*"
          - tailwindcss
          - postcss
          - autoprefixer
          - wrangler
          - "@opennextjs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
